<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Totalizador</title>
</head>

<body>

<h1>Totalizador de Ventas</h1>

<form id="totalizar-form">

<label>Cantidad de items:</label>
<input type="number" id="cantidad-items" required />

<br><br>

<label>Precio por item:</label>
<input type="number" id="precio-item" step="0.01" required />

<br><br>

<label>Codigo de estado:</label>
<input type="text" id="estado" placeholder="CA, AL..." required />

<br><br>

<input type="submit" value="Totalizar" />

</form>

<div id="resultado-div"></div>

<script type="module" src="./src/presenter.js"></script>

</body>
</html>
