<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Totalizador de Ventas</title>
</head>

<body>

<h1>Totalizador de Ventas</h1>

<form id="totalizar-form">

<label>Cantidad de items:</label>
<input type="number" id="cantidad-items" required />

<br><br>

<label>Precio por item:</label>
<input type="number" id="precio-item" step="0.01" required />

<br><br>

<label>Código de estado:</label>
<select id="estado">
  <option value="CA" selected>California (CA)</option>
  <option value="AL">Alabama (AL)</option>
  <option value="NV">Nevada (NV)</option>
  <option value="UT">Utah (UT)</option>
  <option value="TX">Texas (TX)</option>
</select>

<br><br>

<label>Categoría de producto:</label>
<select id="categoria">
  <option value="varios" selected>Varios</option>
  <option value="alimentos">Alimentos</option>
  <option value="bebidas">Bebidas alcohólicas</option>
  <option value="escritorio">Material de escritorio</option>
  <option value="muebles">Muebles</option>
  <option value="electronicos">Electrónicos</option>
  <option value="vestimenta">Vestimenta</option>
</select>

<br><br>

<label>Peso volumétrico:</label>
<input type="number" id="peso" step="0.01" required />

<br><br>

<label>Tipo de cliente:</label>
<select id="cliente">
  <option value="normal" selected>Normal</option>
  <option value="recurrente">Recurrente</option>
  <option value="antiguo">Antiguo Recurrente</option>
  <option value="especial">Especial</option>
</select>

<br><br>

<input type="submit" value="Totalizar" />

</form>

<br>

<div id="resultado-div"></div>

<script type="module" src="./src/presenter.js"></script>

</body>

</html>
